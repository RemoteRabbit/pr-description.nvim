name: Documentation

on:
  push:
    branches: [main, master]
    paths:
      - "lua/**/*.lua"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  vimdoc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate vimdoc
        uses: kdheepak/panvimdoc@main
        with:
          vimdoc: pr-description
          version: "Neovim >= 0.9.0"
          titledatepattern: "%Y-%m-%d"
          demojify: false
          treesitter: true

      - name: Create PR for vimdoc changes
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "docs: auto-generate vimdoc"
          title: "docs: auto-generate vimdoc"
          branch: docs/auto-vimdoc
          delete-branch: true
          add-paths: doc/

  luadoc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install LuaLS
        uses: leafo/gh-actions-lua@v12
        with:
          luaVersion: "5.1"

      - uses: leafo/gh-actions-luarocks@v6

      - name: Generate API docs
        run: |
          mkdir -p doc/api
          echo "# API Reference" > doc/api/README.md
          echo "" >> doc/api/README.md
          echo "Auto-generated from LuaCATS annotations." >> doc/api/README.md
          echo "" >> doc/api/README.md

          for f in lua/pr-description/*.lua; do
            module=$(basename "$f" .lua)
            echo "## pr-description.${module}" >> doc/api/README.md
            echo "" >> doc/api/README.md
            # Extract @brief blocks
            sed -n '/---@brief \[\[/,/---@brief \]\]/{ /---@brief/d; s/^--- //; s/^---//; p; }' "$f" >> doc/api/README.md
            echo "" >> doc/api/README.md
            # Extract function signatures with their doc comments
            grep -B 20 "^function M\." "$f" | grep "^---" | sed 's/^--- //' | sed 's/^---//' >> doc/api/README.md
            echo "" >> doc/api/README.md
          done

      - name: Create PR for API docs changes
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "docs: auto-generate API reference"
          title: "docs: auto-generate API reference"
          branch: docs/auto-api-reference
          delete-branch: true
          add-paths: doc/
